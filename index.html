<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chitii Mangoes - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Hero Section -->
    <section id="hero">
        <div class="hero-content">
            <h1>Welcome to Chitii Mangoes</h1>
            <p>Your one-stop shop for the freshest mangoes!</p>
            <a href="#products" class="cta-button">Shop Now</a>
        </div>
    </section>

    <!-- Products Section -->
    <section id="products">
        <h2>Our Mangoes</h2>
        <div class="product-list">
            <!-- Product items would be dynamically generated here -->
            <div class="product-item">
                <h3>Mango Varieties</h3>
                <p>Fresh and juicy mangoes</p>
            </div>
            <!-- Additional product items can be added here -->
        </div>
    </section>

    <!-- WhatsApp Integration -->
    <div class="whatsapp-integration">
        <a href="https://wa.me/your-number" target="_blank" class="whatsapp-button">
            Chat with us on WhatsApp!
        </a>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
